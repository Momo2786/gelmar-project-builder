<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gelmar Instant Project Quote</title>

<style>
body {
    font-family: Arial;
    padding: 20px;
    background: #f5f5f5;
}

.container {
    max-width: 500px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

h2 {
    margin-bottom: 5px;
}

p.sub {
    font-size: 14px;
    color: gray;
    margin-bottom: 15px;
}

button {
    padding: 12px;
    margin-top: 10px;
    width: 100%;
    font-size: 16px;
    border: none;
    border-radius: 6px;
    background: #007bff;
    color: white;
}

button:hover {
    background: #0056b3;
}

select, input {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
}

.result {
    margin-top: 20px;
    background: #e8f5e9;
    padding: 15px;
    border-radius: 8px;
}

hr {
    margin: 15px 0;
}
</style>
</head>

<body>

<div class="container">
<h2>Gelmar Instant Project Quote</h2>
<p class="sub">Build your full project in seconds</p>

<label>Select Project:</label>
<select id="project">
<option>Kitchen Cabinets</option>
<option>Wardrobes</option>
<option>Door Installation</option>
</select>

<label>Quantity:</label>
<input type="number" id="qty" value="10" />

<label>
<input type="checkbox" id="contractor"> Contractor Mode (15% discount)
</label>

<button onclick="generate()">Generate Quote</button>

<div id="output" class="result" style="display:none"></div>

</div>

<script>
function generate(){

let qty = document.getElementById('qty').value;

let handles = qty * 2;
let hinges = qty * 3;
let runners = qty * 1;

let total = handles*20 + hinges*15 + runners*50;

// Contractor discount
let contractor = document.getElementById('contractor').checked;
if(contractor){
    total = total * 0.85;
}

document.getElementById('output').style.display = 'block';

document.getElementById('output').innerHTML = `
<h3>Your Project Kit ✅</h3>

<p><b>${handles}</b> Cabinet Handles</p>
<p><b>${hinges}</b> Hinges (Soft Close)</p>
<p><b>${runners}</b> Drawer Runners</p>

<hr>

<h2>Total: R${Math.round(total)}</h2>

<button onclick="alert('Order sent to store!')">Buy Now</button>
<button onclick="shareWhatsApp(${Math.round(total)})">Send to WhatsApp</button>
`;

}

// WhatsApp function
function shareWhatsApp(total){
let msg = encodeURIComponent("Hi, I want to order my Gelmar project kit. Total: R" + total);
window.open("https://wa.me/?text=" + msg, "_blank");
}
</script>

</body>
</html>
