<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gelmar Smart Builder</title>

<style>
body {
    font-family: Arial;
    margin:0;
    background:#f4f6f9;
}

/* Background watermark */
body::before {
    content: "GELMAR";
    position: fixed;
    top: 30%;
    left: 10%;
    font-size: 120px;
    color: rgba(211,47,47,0.05);
    transform: rotate(-30deg);
}

/* Header */
.header {
    background:#d32f2f;
    color:white;
    padding:15px;
    text-align:center;
    font-weight:bold;
}

/* Container */
.container {
    max-width:500px;
    margin:20px auto;
    background:white;
    padding:20px;
    border-radius:10px;
}

/* Inputs */
select, input {
    width:100%;
    padding:10px;
    margin-top:10px;
}

/* Buttons */
button {
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#d32f2f;
    color:white;
    border:none;
}

/* Result */
.result {
    margin-top:20px;
    padding:15px;
    background:#f1f8e9;
}

.grid {
    display:flex;
    flex-wrap:wrap;
    gap:10px;
}

.card {
    flex:1;
    background:white;
    padding:10px;
    text-align:center;
    border-radius:6px;
}
</style>
</head>

<body>

<div class="header">GELMAR Smart Builder</div>

<div class="container">

<label>Project:</label>
<select id="project">
<option value="kitchen">Kitchen Cabinets</option>
<option value="wardrobe">Wardrobes</option>
<option value="door">Doors</option>
</select>

<label>Number of Units:</label>
<input type="number" id="qty" value="10">

<label>Select Store:</label>
<select id="store">
<option>Durban - Gateway</option>
<option>Durban - Springfield</option>
<option>Johannesburg - Sandton</option>
</select>

<label>
<input type="checkbox" id="contractor"> Contractor Pricing
</label>

<button onclick="generate()">Build Project</button>

<div id="output" class="result" style="display:none"></div>

</div>

<script>

function generate(){

let qty = parseInt(document.getElementById("qty").value);
let project = document.getElementById("project").value;

/* Accurate hardware logic */
let handles=0, hinges=0, runners=0, screws=0, locks=0;

if(project==="kitchen"){
    handles = qty * 2;
    hinges = qty * 2; // standard cabinet
    runners = qty * 1;
    screws = qty * 20;
}
else if(project==="wardrobe"){
    handles = qty * 2;
    hinges = qty * 2;
    screws = qty * 15;
}
else {
    hinges = qty * 2;
    locks = qty * 1;
    screws = qty * 10;
}

/* Pricing based on Gelmar ranges */
let total =
(handles * 30) +
(hinges * 15) +
(runners * 80) +
(locks * 120) +
(screws * 1);

let baseTotal = total;

/* Contractor discount */
if(document.getElementById("contractor").checked){
    total *= 0.85;
}

total = Math.round(total);

/* Output */
document.getElementById("output").style.display = "block";

document.getElementById("output").innerHTML = `
<h3>Project Breakdown</h3>

<div class="grid">
<div class="card">${handles}<br>Handles</div>
<div class="card">${hinges}<br>Hinges</div>
<div class="card">${runners}<br>Runners</div>
<div class="card">${locks}<br>Locks</div>
<div class="card">${screws}<br>Screws</div>
</div>

<h2>Total: R${total}</h2>

${document.getElementById("contractor").checked ?
"<p style='color:green'>Savings: R" + (baseTotal-total).toFixed(0) + "</p>" : ""}

<h4>AI Insight</h4>
<p>This configuration is calculated based on standard cabinet hardware requirements per unit.</p>

<button onclick="orderNow(${total})">Buy Now</button>
<button onclick="shareWhatsApp(${total})">Send to WhatsApp</button>
<button onclick="resetForm()">Modify Project</button>
`;
}

/* FIXED MODIFY BUTTON */
function resetForm(){
document.getElementById("output").style.display = "none";
}

/* Order */
function orderNow(total){
alert("Order placed. Total: R" + total);
}

/* WhatsApp */
function shareWhatsApp(total){
let store = document.getElementById("store").value;

let msg = encodeURIComponent(
"Hi Gelmar, I want to order a project kit.\nStore: " + store + "\nTotal: R" + total
);

window.open("https://wa.me/?text=" + msg);
}

</script>

</body>
</html>
