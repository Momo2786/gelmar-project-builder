<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gelmar Smart Builder</title>

<style>
body {
    font-family: Arial;
    margin:0;
    background:#f4f6f9;
}

.header {
    background:#d32f2f;
    color:white;
    padding:15px;
    text-align:center;
    font-weight:bold;
}

.container {
    max-width:500px;
    margin:20px auto;
    background:white;
    padding:20px;
    border-radius:10px;
}

select, input {
    width:100%;
    padding:10px;
    margin-top:10px;
}

button {
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#d32f2f;
    color:white;
    border:none;
}

.result {
    margin-top:20px;
    padding:15px;
    background:#f1f8e9;
}

.grid {
    display:flex;
    flex-wrap:wrap;
    gap:10px;
}

.card {
    flex:1;
    background:white;
    padding:10px;
    text-align:center;
    border-radius:6px;
}
</style>
</head>

<body>

<div class="header">GELMAR Smart Builder</div>

<div class="container">

<label>Project Mode:</label>
<select id="mode" onchange="toggleMode()">
<option value="standard">Standard Units</option>
<option value="custom">Custom Design</option>
</select>

<div id="standardMode">
<label>Units:</label>
<input type="number" id="qty" value="10">
</div>

<div id="customMode" style="display:none">
<label>Width (mm):</label>
<input type="number" id="width" value="2000">

<label>Height (mm):</label>
<input type="number" id="height" value="2000">

<label>Number of Shelves:</label>
<input type="number" id="shelves" value="3">

<label>Number of Drawers:</label>
<input type="number" id="drawers" value="2">
</div>

<label>Select Store:</label>
<select id="store">
<option>Durban - Gateway</option>
<option>Durban - Springfield</option>
<option>Johannesburg - Sandton</option>
</select>

<label>
<input type="checkbox" id="contractor"> Contractor Pricing
</label>

<button onclick="generate()">Build Project</button>

<div id="output" class="result" style="display:none"></div>

</div>

<script>

function toggleMode(){
let mode = document.getElementById("mode").value;
document.getElementById("standardMode").style.display = mode==="standard" ? "block":"none";
document.getElementById("customMode").style.display = mode==="custom" ? "block":"none";
}

function generate(){

let handles=0, hinges=0, runners=0, screws=0, doors=0;

let mode = document.getElementById("mode").value;

/* STANDARD MODE */
if(mode==="standard"){
let qty = parseInt(document.getElementById("qty").value);

handles = qty * 2;
hinges = qty * 2;
runners = qty * 1;
screws = qty * 20;
doors = qty;
}

/* CUSTOM MODE (SMART LOGIC) */
else{

let width = parseInt(document.getElementById("width").value);
let height = parseInt(document.getElementById("height").value);
let shelves = parseInt(document.getElementById("shelves").value);
let drawers = parseInt(document.getElementById("drawers").value);

/* Estimate doors based on width */
doors = Math.ceil(width / 600);

/* Hinges logic */
hinges = doors * (height > 1800 ? 3 : 2);

/* Handles */
handles = doors + drawers;

/* Runners */
runners = drawers;

/* Screws */
screws = (hinges * 4) + (handles * 2) + (runners * 6) + (shelves * 8);

}

/* Pricing */
let total =
(handles * 30) +
(hinges * 15) +
(runners * 80) +
(screws * 1);

let baseTotal = total;

/* Contractor discount */
if(document.getElementById("contractor").checked){
total *= 0.85;
}

total = Math.round(total);

/* Output */
document.getElementById("output").style.display = "block";

document.getElementById("output").innerHTML = `
<h3>Project Breakdown</h3>

<div class="grid">
<div class="card">${doors}<br>Doors</div>
<div class="card">${handles}<br>Handles</div>
<div class="card">${hinges}<br>Hinges</div>
<div class="card">${runners}<br>Runners</div>
<div class="card">${screws}<br>Screws</div>
</div>

<h2>Total: R${total}</h2>

${document.getElementById("contractor").checked ?
"<p style='color:green'>Savings: R" + (baseTotal-total).toFixed(0) + "</p>" : ""}

<h4>AI Insight</h4>
<p>Calculated based on cabinet width, height, shelves, and drawer configuration.</p>

<button onclick="orderNow(${total})">Buy Now</button>
<button onclick="shareWhatsApp(${total})">Send to WhatsApp</button>
<button onclick="resetForm()">Modify Project</button>
`;
}

/* Reset */
function resetForm(){
document.getElementById("output").style.display = "none";
}

/* Order */
function orderNow(total){
alert("Order placed. Total: R" + total);
}

/* WhatsApp */
function shareWhatsApp(total){
let store = document.getElementById("store").value;

let msg = encodeURIComponent(
"Hi Gelmar, I want to order a custom project.\nStore: " + store + "\nTotal: R" + total
);

window.open("https://wa.me/?text=" + msg);
}

</script>

</body>
</html>
