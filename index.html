<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gelmar Smart Builder</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin:0;
    background:#f4f6f9;
}

/* Header */
.header {
    background:#d32f2f;
    color:white;
    padding:15px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
}

/* Container */
.container {
    max-width:500px;
    margin:20px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.sub {
    text-align:center;
    font-size:13px;
    color:gray;
    margin-bottom:15px;
}

/* Inputs */
select, input {
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:6px;
    border:1px solid #ddd;
}

/* Buttons */
button {
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:6px;
    font-size:15px;
    background:#d32f2f;
    color:white;
}

button.secondary {
    background:#4caf50;
}

button.light {
    background:#607d8b;
}

/* Cards */
.grid {
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.card {
    flex:1;
    background:white;
    border-radius:8px;
    padding:10px;
    text-align:center;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.card img {
    width:40px;
    margin-bottom:5px;
}

/* Result */
.result {
    margin-top:20px;
    padding:15px;
    background:#f1f8e9;
    border-radius:8px;
}

.total {
    font-size:22px;
    font-weight:bold;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="header">GELMAR Smart Builder</div>

<div class="container">

<p class="sub">AI-powered project builder for fittings & hardware</p>

<label>Project Type:</label>
<select id="project">
<option value="kitchen">Kitchen Cabinets</option>
<option value="wardrobe">Wardrobes</option>
<option value="door">Door Installation</option>
</select>

<label>Project Size:</label>
<select id="complexity">
<option value="basic">Basic</option>
<option value="premium">Premium</option>
<option value="contractor">Contractor</option>
</select>

<label>Quantity:</label>
<input type="number" id="qty" value="10">

<label>Select Store:</label>
<select id="store">
<option>Durban - Gateway</option>
<option>Durban - Springfield</option>
<option>Johannesburg - Sandton</option>
</select>

<label>
<input type="checkbox" id="contractorMode"> Contractor Pricing (15% off)
</label>

<button onclick="generate()">Build My Project</button>

<div id="output" class="result" style="display:none"></div>

</div>

<script>

function generate(){

let qty = parseInt(document.getElementById('qty').value);
let project = document.getElementById('project').value;
let complexity = document.getElementById('complexity').value;

let handles=0, hinges=0, runners=0, extras=0;

/* AI Logic (simulated intelligence) */

if(project==="kitchen"){
    handles = qty * 2;
    hinges = qty * 3;
    runners = qty;
    extras = qty * 10;
}
else if(project==="wardrobe"){
    handles = qty * 2;
    hinges = qty * 2;
    runners = 0;
    extras = qty * 5;
}
else{
    hinges = qty * 2;
    handles = 0;
    runners = 0;
    extras = qty * 3;
}

/* Complexity adjustment */
if(complexity==="premium"){
    hinges *= 1.2;
    runners *= 1.2;
}
if(complexity==="contractor"){
    hinges *= 1.5;
    runners *= 1.5;
    extras *= 2;
}

let total = handles*25 + hinges*20 + runners*60 + extras;

/* Contractor pricing */
if(document.getElementById('contractorMode').checked){
    total *= 0.85;
}

total = Math.round(total);

document.getElementById('output').style.display = "block";

document.getElementById('output').innerHTML = `
<h3>Recommended Project Kit</h3>

<div class="grid">

<div class="card">
<img src="https://img.icons8.com/ios-filled/50/door-handle.png">
<p><b>${Math.round(handles)}</b></p>
<p>Handles</p>
</div>

<div class="card">
<img src="https://img.icons8.com/ios-filled/50/hinge.png">
<p><b>${Math.round(hinges)}</b></p>
<p>Hinges</p>
</div>

<div class="card">
<img src="https://img.icons8.com/ios-filled/50/drawer.png">
<p><b>${Math.round(runners)}</b></p>
<p>Runners</p>
</div>

<div class="card">
<img src="https://img.icons8.com/ios-filled/50/toolbox.png">
<p><b>${Math.round(extras)}</b></p>
<p>Accessories</p>
</div>

</div>

<div class="total">Total: R${total}</div>

<button onclick="orderNow(${total})">Buy Now</button>
<button class="secondary" onclick="shareWhatsApp(${total})">Send to WhatsApp</button>
<button class="light" onclick="generate()">Modify Project</button>
`;

}

/* Order */
function orderNow(total){
alert("Order placed with Gelmar! Total: R" + total);
}

/* WhatsApp */
function shareWhatsApp(total){
let store = document.getElementById('store').value;

let msg = encodeURIComponent(
"Hi Gelmar, I want to order a project kit.\nStore: " + store + "\nTotal: R" + total
);

window.open("https://wa.me/?text=" + msg, "_blank");
}

</script>

</body>
</html></style>
