<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gelmar Project Builder Demo</title>
<style>
body { font-family: Arial; padding:20px; background:#f5f5f5; }
.container { max-width:500px; margin:auto; background:white; padding:20px; border-radius:10px; }
button { padding:12px; margin-top:10px; width:100%; font-size:16px; }
select, input { width:100%; padding:10px; margin-top:10px; }
.result { margin-top:20px; background:#e8f5e9; padding:15px; border-radius:8px; }
</style>
</head>
<body>
<div class="container">
<h2>Project Builder</h2>
<label>Select Project:</label>
<select id="project">
<option>Kitchen Cabinets</option>
<option>Wardrobes</option>
<option>Door Installation</option>
</select><label>Quantity:</label> <input type="number" id="qty" value="10" />

<button onclick="generate()">Generate Quote</button>

<div id="output" class="result" style="display:none"></div>
</div><script>
function generate(){
let qty = document.getElementById('qty').value;
let handles = qty * 2;
let hinges = qty * 3;
let runners = qty * 1;
let total = handles*20 + hinges*15 + runners*50;

document.getElementById('output').style.display = 'block';
document.getElementById('output').innerHTML = `
<h3>Your Project Kit</h3>
<p>${handles} Handles</p>
<p>${hinges} Hinges</p>
<p>${runners} Drawer Runners</p>
<h3>Total: R${total}</h3>
<button>Buy Now</button>
`;
}
</script></body>
</html>
